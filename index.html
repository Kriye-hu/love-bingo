<style>

  body {

    flex-direction: column;
    align-items: center;

    color: #5a3e4e;

  .bg-blob {
    position: fixed;
    border-radius: 50%;

    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
  }
  .bg-blob:nth-child(1) { width: 300px; height: 300px; background: #ffb8d0; top: -80px; left: -60px; }
  .bg-blob:nth-child(2) { width: 250px; height: 250px; background: #ffcda8; bottom: -50px; right: -40px; }
  .bg-blob:nth-child(3) { width: 200px; height: 200px; background: #e8b4d8; top: 40%; left: 50%; }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
  }

  .header {
    text-align: center;
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #e8507e, #f5a060);

    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
  }
  .header .subtitle {
    font-size: 0.85rem;
    color: #b07a9e;
    margin-top: 4px;
    letter-spacing: 4px;
  }
  .header .emoji-row {
    font-size: 1.3rem;
    margin-top: 6px;
    letter-spacing: 4px;
  }

  .progress-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .progress-bar-bg {
    flex: 1;
    max-width: 260px;
    height: 8px;
    background: rgba(255,255,255,0.6);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #e8507e, #f5a060);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;

  .progress-text {
    font-size: 0.8rem;
    color: #b07a9e;
    font-weight: 600;
    white-space: nowrap;
  }

  .bingo-card {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 16px;
    box-shadow:
      0 8px 32px rgba(200, 120, 150, 0.12),
      0 2px 8px rgba(200, 120, 150, 0.08),
      inset 0 1px 0 rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.5);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), box-shadow 0.3s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* 未刮开状态 */
  .cell.hidden-cell {
    background: linear-gradient(145deg, #fde2ed, #fce4c8);
    border: 2px dashed rgba(229, 80, 126, 0.3);
    box-shadow:
      0 4px 12px rgba(229, 80, 126, 0.1),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .cell.hidden-cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%, rgba(255,255,255,0.2) 100%);
    pointer-events: none;
  }
  .cell.hidden-cell .cell-no {
    font-size: 0.7rem;
    font-weight: 700;
    color: #e8507e;
    opacity: 0.8;
    letter-spacing: 1px;
  }
  .cell.hidden-cell .scratch-icon {
    font-size: 1.4rem;
    margin-bottom: 2px;
    opacity: 0.6;
  }
  .cell.hidden-cell:active {
    transform: scale(0.95);
  }

  /* 已刮开状态 */
  .cell.revealed {
    background: linear-gradient(145deg, #fff5f8, #fff8f0);
    border: 1px solid rgba(229, 80, 126, 0.12);
    box-shadow:
      0 4px 16px rgba(229, 80, 126, 0.1),
      inset 0 1px 0 rgba(255,255,255,0.9);
    cursor: default;
    transform: none;
  }
  .cell.revealed .cell-task {
    font-size: 0.7rem;
    font-weight: 600;
    color: #7a4a64;
    text-align: center;
    line-height: 1.35;
    padding: 4px 2px;
    word-break: break-all;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .cell.revealed .cell-task .task-icon {
    font-size: 1.1rem;
    margin-bottom: 2px;
  }
  .cell.revealed .cell-no {

    color: #ccc;

    top: 4px;
    right: 6px;
    font-weight: 500;

  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confettiFall 1.5s ease-out forwards;

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }

  /* 刮开动画 */

    0% { transform: scale(1); opacity: 1; }

  @media (max-width: 380px) {
    .header h1 { font-size: 1.5rem; }

    margin-top: 20px;
    font-size: 0.7rem;
    color: #d4a0b8;

<script>
const STORAGE_KEY = "love-bingo-revealed";
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...revealedCells])); } catch(e) {}
}
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { const arr = JSON.parse(saved); if (Array.isArray(arr)) return new Set(arr); }
  } catch(e) {}
  return new Set();
}
function shareBingo() {
  const count = revealedCells.size;
  const text = "💕 恋爱刮刮Bingo - 我已刮开 " + count + "/24";
  if (navigator.share) { navigator.share({ title: "恋爱刮刮Bingo", text, url: window.location.href }); }
  else { navigator.clipboard.writeText(text + " " + window.location.href).then(function() { alert("✅ 分享链接已复制！"); }); }
}
function resetGame() {
  if (!confirm("确定重置？所有进度将丢失！")) return;
  revealedCells.clear(); bingoDetected = false; localStorage.removeItem(STORAGE_KEY);

}

// 生成优惠券序列号
function generateSerial() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let s = '520-';
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

// 当前卡片数据
let cardData = []; // 24个任务（不包括中间免费格）
let revealedCells = new Set(); // 已刮开的格子索引
let bingoDetected = false;

// 初始化
function initGrid() {
  newCard();
}

// 生成新卡片
function newCard() {
  bingoDetected = false;
  revealedCells.clear();
  // 随机打乱任务
  const shuffled = [...TASKS].sort(() => Math.random() - 0.5);
  cardData = shuffled.slice(0, 24);
  renderGrid();
  updateProgress();
  // 重新生成序列号
  document.getElementById('couponSerial').textContent = 'NO.' + generateSerial();
}

// 重置当前卡片
function resetCard() {
  revealedCells.clear();
  bingoDetected = false;
  renderGrid();
  updateProgress();
}

// 渲染网格
function renderGrid() {
  const grid = document.getElementById('bingoGrid');
  grid.innerHTML = '';

  let taskIndex = 0;
  for (let i = 0; i < 25; i++) {
    const row = Math.floor(i / 5);
    const col = i % 5;
    const isCenter = row === 2 && col === 2;

    const cell = document.createElement('div');
    cell.className = 'cell';

    if (isCenter) {
      cell.classList.add('free-cell');
      cell.innerHTML = `
        <div class="free-icon">💝</div>
        <div class="cell-free-text">今日限定<br>心动位</div>
      `;
    } else {
      const idx = taskIndex;
      taskIndex++;

      if (revealedCells.has(idx)) {
        cell.classList.add('revealed');
        const task = cardData[idx];
        // 去掉emoji从标题里提取
        const iconMatch = task.match(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/u);
        const icon = iconMatch ? iconMatch[0] : '💕';
        const text = task.replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/gu, '').trim();
        cell.innerHTML = `
          <span class="cell-no">NO. ${idx + 1}</span>
          <div class="cell-task">
            <span class="task-icon">${icon}</span>
            ${text}
          </div>
        `;
      } else {
        cell.classList.add('hidden-cell');
        cell.innerHTML = `
          <div class="scratch-icon">✨</div>
          <div class="cell-no">NO. ${idx + 1}</div>
        `;
        cell.onclick = () => revealCell(idx, cell);
      }
    }

    grid.appendChild(cell);
  }
}

// 刮开格子
function revealCell(idx, cellEl) {
  if (revealedCells.has(idx) || bingoDetected) return;

  revealedCells.add(idx);
  cellEl.classList.remove('hidden-cell');
  cellEl.classList.add('revealed', 'scratching');
  // 移除onclick
  cellEl.onclick = null;

  // 获取任务数据
  const task = cardData[idx];
  const iconMatch = task.match(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/u);
  const icon = iconMatch ? iconMatch[0] : '💕';
  const text = task.replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/gu, '').trim();

  // 重新渲染该格子内容
  setTimeout(() => {
    cellEl.classList.remove('scratching');
    cellEl.innerHTML = `
      <span class="cell-no">NO. ${idx + 1}</span>
      <div class="cell-task">
        <span class="task-icon">${icon}</span>
        ${text}
      </div>
    `;
  }, 200);

  updateProgress();
  checkBingo();
  saveState();
}

// 更新进度
function updateProgress() {
  const count = revealedCells.size;
  const pct = (count / 24) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `已刮开 ${count}/24`;
}

// 检查Bingo
function checkBingo() {
  // 获取5x5矩阵状态，1=已刮开或免费格，0=未刮开
  const board = Array.from({length:5}, () => Array(5).fill(0));

  // 填充免费格
  board[2][2] = 1;

  // 填充其他格子
  let taskIdx = 0;
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (r === 2 && c === 2) continue;
      if (revealedCells.has(taskIdx)) board[r][c] = 1;
      taskIdx++;
    }
  }

  // 检查行
  for (let r = 0; r < 5; r++) {
    if (board[r].every(v => v === 1)) { triggerBingo(); return; }
  }
  // 检查列
  for (let c = 0; c < 5; c++) {
    if (board.every(row => row[c] === 1)) { triggerBingo(); return; }
  }
  // 检查对角线
  if ([0,1,2,3,4].every(i => board[i][i] === 1)) { triggerBingo(); return; }
  if ([0,1,2,3,4].every(i => board[i][4-i] === 1)) { triggerBingo(); return; }
}

// 触发Bingo
function triggerBingo() {
  if (bingoDetected) return;
  bingoDetected = true;

  // 随机选择奖励券
  const coupon = COUPONS[Math.floor(Math.random() * COUPONS.length)];
  document.getElementById('couponEmoji').textContent = coupon.emoji;
  document.getElementById('couponTitle').textContent = coupon.title;
  document.getElementById('couponDesc').textContent = coupon.desc;

  // 显示弹窗
  document.getElementById('modalOverlay').classList.add('show');

  // 放彩带
  launchConfetti();
}

// 关闭弹窗
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  // 清除彩带
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
}

// 彩带效果
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#e8507e', '#f5a060', '#ffb8d0', '#ffcda8', '#e8b4d8', '#ffd700', '#ff6b9d'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    piece.style.animationDuration = (1 + Math.random()) + 's';
    piece.style.width = (6 + Math.random() * 6) + 'px';
    piece.style.height = (6 + Math.random() * 6) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(piece);
  }
}

// 启动
initGrid();
</script>
